name: Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

defaults:
  run:
    working-directory: frontend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npx tsc --noEmit

      # NEXT_PUBLIC_* vars are baked in at build time — dummy values here
      # are enough to prove the build compiles; they are not used at
      # runtime by this job. See docs/Deployment.md for real values.
      - run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
