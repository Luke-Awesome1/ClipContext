services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    # Override the image's production CMD with --reload for local dev, and
    # bind-mount source so edits take effect without a rebuild.
    command: sh -c "uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./main.py:/app/main.py
      - ./data:/app/data
      - ./outputs:/app/outputs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev"
    ports:
      - "3000:3000"
    env_file:
      - frontend/.env.local
    environment:
      # Overrides frontend/.env.local so the browser-facing build reaches
      # the backend container by its published port on the host, not the
      # in-network service name (NEXT_PUBLIC_* values are resolved
      # client-side, in the browser, not inside the Docker network).
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    depends_on:
      backend:
        condition: service_healthy

volumes:
  frontend_node_modules:
  frontend_next_cache:
